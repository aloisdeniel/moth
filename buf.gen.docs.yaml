# Generates the API reference from the .proto sources with protoc-gen-doc,
# so the published API docs never drift from the wire contract. Run via
# `make docs-proto`; the output (docs/api/reference.md) is committed and
# single-sourced into the website + embedded /docs like the CLI reference.
#
# Uses the buf remote plugin registry, so no local protoc-gen-doc install is
# needed — just `buf generate --template buf.gen.docs.yaml` with network.
version: v2
plugins:
  - remote: buf.build/community/pseudomuto-doc:v1.5.1
    out: docs/api
    opt:
      - markdown,reference.md
