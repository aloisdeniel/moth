version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Best-effort calls where the error is deliberately ignored:
      # deferred closes/rollbacks and writes to an already-committed
      # HTTP response.
      exclude-functions:
        - (io.Closer).Close
        - (*github.com/aloisdeniel/moth/internal/store.Store).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Tx).Rollback
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
  exclusions:
    paths:
      - gen
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - gen
