syntax = "proto3";

package moth.admin.v1;

import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "moth/admin/v1/theme.proto";

option go_package = "github.com/aloisdeniel/moth/gen/moth/admin/v1;adminv1";

// ProjectService manages the projects (one per mobile app) hosted by this
// moth instance. All RPCs require an authenticated admin session.
service ProjectService {
  rpc CreateProject(CreateProjectRequest) returns (CreateProjectResponse);
  rpc GetProject(GetProjectRequest) returns (GetProjectResponse);
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse);
  rpc UpdateProject(UpdateProjectRequest) returns (UpdateProjectResponse);
  rpc DeleteProject(DeleteProjectRequest) returns (DeleteProjectResponse);
  // RegenerateSecretKey replaces the project's server-to-server secret key.
  // The old key stops working immediately; the new one is returned exactly
  // once, in this response.
  rpc RegenerateSecretKey(RegenerateSecretKeyRequest) returns (RegenerateSecretKeyResponse);
  // GetSigningKey returns the project's active token-signing key (public
  // part) and its JWKS URL, for the admin overview card.
  rpc GetSigningKey(GetSigningKeyRequest) returns (GetSigningKeyResponse);
  // ResetSigningKey generates a fresh ES256 keypair, removes every previous
  // key from the project JWKS immediately, and revokes all refresh tokens.
  // Every access token ever issued becomes invalid and all users must sign
  // in again.
  rpc ResetSigningKey(ResetSigningKeyRequest) returns (ResetSigningKeyResponse);
  // RotateSigningKey generates a fresh ES256 keypair that signs new tokens
  // from now on, while the previous key stays in the project JWKS for a
  // grace period (default: access-token TTL + clock skew). Tokens already
  // issued keep validating until they expire, so — unlike ResetSigningKey —
  // no user is signed out. Expired grace keys are pruned automatically.
  rpc RotateSigningKey(RotateSigningKeyRequest) returns (RotateSigningKeyResponse);
  // ExportProject returns the project's users as JSON for migration off moth
  // (no lock-in). Password hashes are included so accounts can be recreated
  // elsewhere. Large projects should prefer the CLI, which pages.
  rpc ExportProject(ExportProjectRequest) returns (ExportProjectResponse);
  // ImportProject bulk-creates users from a JSON document, optionally
  // carrying foreign password hashes (bcrypt/scrypt/argon2/pbkdf2) so teams
  // can migrate from another provider without a forced password reset. A
  // user whose email already exists is skipped.
  rpc ImportProject(ImportProjectRequest) returns (ImportProjectResponse);
}

message Project {
  string id = 1;
  string name = 2;
  // URL-safe identifier, used in hosted-page and JWKS URLs (/p/{slug}/...).
  string slug = 3;
  // Identifies the project to the mobile SDK. Safe to embed in an app.
  string publishable_key = 4;
  google.protobuf.Timestamp create_time = 5;
  google.protobuf.Timestamp update_time = 6;
  ProjectSettings settings = 7;
  // Number of end-user accounts in the project.
  int64 user_count = 8;
}

// ProjectSettings is the per-project auth policy.
message ProjectSettings {
  // Minimum accepted password length (default 8).
  int32 password_min_length = 1;
  // Block SignIn until the email address is verified.
  bool require_email_verification = 2;
  // Whether the public SignUp RPC is open (invite-only projects: false).
  bool allow_public_signup = 3;
  // SignUp with an already-registered email returns OK and mails the owner
  // instead of erroring, so responses never reveal whether an account
  // exists.
  bool enumeration_safe_signup = 4;
  // Access token (JWT) lifetime in seconds (default 900).
  int32 access_token_ttl_seconds = 5;
  // Refresh token sliding window in days (default 30).
  int32 refresh_token_ttl_days = 6;
  // Sign in with Google configuration.
  GoogleProviderConfig google = 7;
  // Sign in with Apple configuration.
  AppleProviderConfig apple = 8;
  // Link a social identity to an existing account when the provider asserts
  // the same, verified email. The server default is TRUE: `optional` so that
  // "unset" (from clients predating this field) is distinguishable from an
  // explicit false and reads as the default. Reads always populate it.
  optional bool auto_link_verified_email = 9;
  // Custom URL schemes the web-redirect OAuth fallback may redirect back to
  // (e.g. "myapp"). Open-redirect protection: callbacks only ever redirect
  // to a scheme on this list.
  repeated string redirect_schemes = 10;
  // How long raw analytics events are kept before the rollup job prunes
  // them, in days (default 90).
  int32 analytics_retention_days = 11;
  // IANA timezone name (e.g. "Europe/Paris") the analytics rollup buckets
  // days in (default "UTC").
  string rollup_timezone = 12;
  // When non-empty, signup is restricted to email addresses whose domain
  // matches one of these glob patterns (e.g. "example.com", "*.acme.io");
  // every other domain is rejected.
  repeated string signup_email_allowlist = 13;
  // Email-domain glob patterns rejected at signup, evaluated after the
  // allowlist.
  repeated string signup_email_blocklist = 14;
  // Optional CAPTCHA verification endpoint. The CAPTCHA hook is documented
  // but off by default in v1: this field is stored but not yet wired.
  string captcha_verify_url = 15;
}

// GoogleProviderConfig configures Sign in with Google for one project. The
// client IDs are the allowed `aud` values when verifying Google ID tokens.
message GoogleProviderConfig {
  bool enabled = 1;
  // OAuth client ID of type "Web application"; also used by the
  // web-redirect fallback flow.
  string web_client_id = 2;
  // OAuth client ID of type "iOS".
  string ios_client_id = 3;
  // OAuth client ID of type "Android".
  string android_client_id = 4;
  // Client secret of the web client, needed for the web-redirect code
  // exchange. Write-only: accepted on update, never returned by reads. On
  // update, an empty value keeps the stored one; reads report presence via
  // has_web_client_secret. Stored encrypted at rest.
  string web_client_secret = 5;
  // Output only: whether a web client secret is stored.
  bool has_web_client_secret = 6;
}

// AppleProviderConfig configures Sign in with Apple for one project.
message AppleProviderConfig {
  bool enabled = 1;
  // Services ID (web-redirect flow `aud`, e.g. "com.example.app.signin").
  string services_id = 2;
  // Apple Developer Team ID.
  string team_id = 3;
  // Key ID of the "Sign in with Apple" private key.
  string key_id = 4;
  // Contents of the `.p8` private key file, used to mint Apple client
  // secrets. Write-only: accepted on update, never returned by reads. On
  // update, an empty value keeps the stored one; reads report presence via
  // has_private_key. Stored encrypted at rest.
  string private_key_p8 = 5;
  // Output only: whether a private key is stored.
  bool has_private_key = 6;
  // App bundle IDs accepted as `aud` on native Apple ID tokens.
  repeated string bundle_ids = 7;
}

// SigningKey is the public half of one project token-signing keypair.
message SigningKey {
  // RFC 7638 JWK thumbprint, the `kid` on every JWT the key signs.
  string kid = 1;
  // Signature algorithm, always "ES256".
  string algorithm = 2;
  // PEM-encoded public key (PKIX), for offline verification setups.
  string public_key_pem = 3;
  google.protobuf.Timestamp create_time = 4;
}

// ProjectSpec is the full desired state of one project: the document
// `moth project dump` emits and `moth project apply` consumes (serialized
// as JSON/YAML via protojson). It reuses this package's messages verbatim,
// so no apply RPC is needed server-side — the CLI composes the existing
// calls, keyed on the slug: CreateProject (when no project has the slug)
// or UpdateProject (name + settings), then ThemeService.UpdateTheme.
// Write-only provider secrets never appear in dumps (reads only report
// has_* presence) and an empty secret field on apply keeps the stored
// value, matching UpdateProject semantics. Output-only fields (has_*,
// logo asset paths) are ignored on apply.
message ProjectSpec {
  string name = 1;
  // Identity of the spec: apply creates the project when no project has
  // this slug and updates it otherwise.
  string slug = 2;
  ProjectSettings settings = 3;
  // Design-system theme (legal links included); unset means the built-in
  // default theme.
  Theme theme = 4;
}

message CreateProjectRequest {
  string name = 1;
  // Optional explicit slug (lowercase letters, digits and single dashes).
  // Empty derives one from the name, adding a suffix on collision; an
  // explicit slug that is already taken fails ALREADY_EXISTS. Lets
  // `moth project apply` create a project under the exact slug its spec
  // is keyed on.
  string slug = 2;
}

message CreateProjectResponse {
  Project project = 1;
  // The server-to-server secret key. Stored hashed server-side and therefore
  // returned exactly once, in this response.
  string secret_key = 2;
}

message GetProjectRequest {
  string id = 1;
}

message GetProjectResponse {
  Project project = 1;
}

message ListProjectsRequest {}

message ListProjectsResponse {
  repeated Project projects = 1;
}

message UpdateProjectRequest {
  string id = 1;
  string name = 2;
  // Replaces the whole settings object when set; leave unset to keep the
  // current settings.
  ProjectSettings settings = 3;
  // Fields to update ("name", "settings"). When unset, legacy behavior:
  // name is always applied, settings only when present.
  google.protobuf.FieldMask update_mask = 4;
}

message UpdateProjectResponse {
  Project project = 1;
}

message DeleteProjectRequest {
  string id = 1;
}

message DeleteProjectResponse {}

message RegenerateSecretKeyRequest {
  string project_id = 1;
}

message RegenerateSecretKeyResponse {
  Project project = 1;
  // The replacement secret key, returned exactly once.
  string secret_key = 2;
}

message GetSigningKeyRequest {
  string project_id = 1;
}

message GetSigningKeyResponse {
  SigningKey key = 1;
  // Absolute URL of the project JWKS document.
  string jwks_url = 2;
  // Expected `iss` claim of this project's access tokens.
  string issuer = 3;
  // Expected `aud` claim (the project slug).
  string audience = 4;
}

message ResetSigningKeyRequest {
  string project_id = 1;
}

message ResetSigningKeyResponse {
  // The replacement signing key.
  SigningKey key = 1;
}

message RotateSigningKeyRequest {
  string project_id = 1;
  // Grace period, in seconds, the previous key stays in the JWKS. 0 uses the
  // server default (access-token TTL + clock skew).
  int32 grace_seconds = 2;
}

message RotateSigningKeyResponse {
  // The new active signing key.
  SigningKey key = 1;
  // When the previous key leaves the JWKS and becomes eligible for pruning.
  google.protobuf.Timestamp grace_expire_time = 2;
}

// ExportedIdentity is one linked provider of an exported/imported user.
message ExportedIdentity {
  // "password", "google" or "apple".
  string provider = 1;
  // Provider-issued subject (the user id for password identities).
  string provider_subject = 2;
  // Email the provider asserted when the identity was linked.
  string email = 3;
}

// ExportedUser is one user in an export document, with everything needed to
// recreate the account on another system.
message ExportedUser {
  string id = 1;
  string email = 2;
  bool email_verified = 3;
  string display_name = 4;
  string avatar_url = 5;
  // JSON object embedded in the JWT `claims` claim.
  string custom_claims = 6;
  bool disabled = 7;
  google.protobuf.Timestamp create_time = 8;
  google.protobuf.Timestamp last_login_time = 9;
  // Encoded password hash; empty for social-only accounts.
  string password_hash = 10;
  // Algorithm that produced password_hash: "argon2id" for a native moth
  // hash, or the foreign algorithm it was imported with.
  string password_algorithm = 11;
  repeated ExportedIdentity identities = 12;
}

// ImportedUser is one user to create, optionally carrying a foreign password
// hash. A foreign hash is verified with its original algorithm on the user's
// first sign-in, then transparently rehashed to argon2id.
message ImportedUser {
  string email = 1;
  bool email_verified = 2;
  string display_name = 3;
  string avatar_url = 4;
  // JSON object embedded in the JWT `claims` claim (defaults to "{}").
  string custom_claims = 5;
  // Encoded password hash; empty for users without a password.
  string password_hash = 6;
  // Algorithm that produced password_hash: "bcrypt", "scrypt", "argon2" or
  // "pbkdf2" for a foreign hash, or "argon2id"/"" for a native moth hash.
  string password_algorithm = 7;
  repeated ExportedIdentity identities = 8;
  // Whether the account is created disabled (blocked from signing in).
  bool disabled = 9;
}

message ExportProjectRequest {
  string project_id = 1;
}

message ExportProjectResponse {
  repeated ExportedUser users = 1;
}

message ImportProjectRequest {
  string project_id = 1;
  repeated ImportedUser users = 2;
}

message ImportProjectResponse {
  // Number of users actually created.
  int32 imported_count = 1;
  // Number skipped because their email was already registered.
  int32 skipped_count = 2;
}
