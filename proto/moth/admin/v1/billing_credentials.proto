syntax = "proto3";

package moth.admin.v1;

option go_package = "github.com/aloisdeniel/moth/gen/moth/admin/v1;adminv1";

// BillingCredentialsService edits a project's store API credentials — the
// Apple App Store Server API In-App-Purchase key and the Google Play Developer
// API service account, plus the webhook shared secrets. Secrets are write-only
// (accepted on update, never returned; reads report presence via has_*
// indicators) and stored encrypted at rest, like every other moth secret. All
// RPCs require an authenticated admin session.
service BillingCredentialsService {
  // GetBillingCredentials returns the non-secret fields and has_* presence
  // indicators for the stored secrets.
  rpc GetBillingCredentials(GetBillingCredentialsRequest) returns (GetBillingCredentialsResponse);
  // UpdateBillingCredentials writes the credentials. For each secret field, an
  // empty value keeps the stored one; reads never echo secrets back.
  rpc UpdateBillingCredentials(UpdateBillingCredentialsRequest) returns (UpdateBillingCredentialsResponse);
}

// AppleBillingConfig is a project's App Store Server API configuration.
message AppleBillingConfig {
  // In-App-Purchase key id (from App Store Connect).
  string iap_key_id = 1;
  // Issuer id of the In-App-Purchase key.
  string iap_issuer_id = 2;
  // Contents of the `.p8` In-App-Purchase private key. Write-only: accepted on
  // update, never returned; empty keeps the stored one. Stored encrypted.
  string iap_key_p8 = 3;
  // Output only: whether a `.p8` key is stored.
  bool has_iap_key = 4;
  // App bundle id (the `aud`/`bid` of signed transactions).
  string bundle_id = 5;
  // The app's Apple id (numeric App Store id).
  string app_apple_id = 6;
  // Shared secret authenticating the App Store Server Notifications webhook.
  // Write-only; empty keeps the stored one. Stored encrypted.
  string notification_secret = 7;
  // Output only: whether a notification secret is stored.
  bool has_notification_secret = 8;
  // The App Store Server Notification URL moth has registered for the app.
  // Apple exposes no read for it, so moth persists what it registered to keep
  // `moth setup billing` idempotent (re-register only on a change). Set by the
  // CLI after a successful registration; empty on update keeps the stored one.
  string notification_url = 9;
}

// GoogleBillingConfig is a project's Google Play Developer API configuration.
message GoogleBillingConfig {
  // Service-account JSON with Play Developer API access. Write-only: accepted
  // on update, never returned; empty keeps the stored one. Stored encrypted.
  string service_account_json = 1;
  // Output only: whether a service account is stored.
  bool has_service_account = 2;
  // App package name.
  string package_name = 3;
  // Cloud Pub/Sub topic RTDN messages are published to.
  string pubsub_topic = 4;
  // Shared secret authenticating the RTDN Pub/Sub push webhook. Write-only;
  // empty keeps the stored one. Stored encrypted.
  string rtdn_secret = 5;
  // Output only: whether an RTDN secret is stored.
  bool has_rtdn_secret = 6;
}

message GetBillingCredentialsRequest {
  string project_id = 1;
}

message GetBillingCredentialsResponse {
  AppleBillingConfig apple = 1;
  GoogleBillingConfig google = 2;
}

message UpdateBillingCredentialsRequest {
  string project_id = 1;
  AppleBillingConfig apple = 2;
  GoogleBillingConfig google = 3;
}

message UpdateBillingCredentialsResponse {
  AppleBillingConfig apple = 1;
  GoogleBillingConfig google = 2;
}
