syntax = "proto3";

package moth.admin.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/aloisdeniel/moth/gen/moth/admin/v1;adminv1";

// CopyService manages a project's localization copy: the per-locale overrides
// on top of moth's bundled message catalog (internal/i18n). The catalog is a
// small, closed, curated key set per screen — sign_in.*, sign_up.*,
// password_reset.*, verify_email.*, paywall.* — with a bundled default in
// every bundled locale, so a project that customizes nothing is still fully
// localized. Overrides are validated server-side (key must exist, required
// placeholders present, length bounded) so any accepted copy still renders a
// sensible screen. Every save creates a revision (the last 10 are kept for
// undo). All RPCs require an authenticated admin session. Mirrors
// ThemeService (design tokens) — copy keyed by screen × locale instead of by
// color.
service CopyService {
  // GetProjectCopy returns the editable copy for one locale: every catalog key
  // (optionally filtered to one screen) with its bundled default for that
  // locale plus the project's current override, so the editor can render the
  // whole editable surface and a reset-to-default hint per key.
  rpc GetProjectCopy(GetProjectCopyRequest) returns (GetProjectCopyResponse);
  // UpdateProjectCopy replaces one locale's overrides with the supplied
  // key → value map (validated against the catalog) and returns the new
  // revision. Keys omitted (or set empty) fall back to the bundled default.
  rpc UpdateProjectCopy(UpdateProjectCopyRequest) returns (UpdateProjectCopyResponse);
  // ListCopyRevisions returns the saved revisions, newest first (at most the
  // 10 the server keeps).
  rpc ListCopyRevisions(ListCopyRevisionsRequest) returns (ListCopyRevisionsResponse);
  // RestoreCopyRevision re-installs an old revision's whole override document
  // as a new revision (history only ever moves forward).
  rpc RestoreCopyRevision(RestoreCopyRevisionRequest) returns (RestoreCopyRevisionResponse);
  // ResetCopy reverts one key (key set) or a whole locale (key empty) to the
  // bundled default by removing the override(s), as a new revision. Removing
  // the last override reverts the project to the fully bundled default.
  rpc ResetCopy(ResetCopyRequest) returns (ResetCopyResponse);
  // ListLocales returns the project's available locales (its default plus any
  // it has customized) and moth's bundled locales, so the editor can offer a
  // language selector with an "add language" action.
  rpc ListLocales(ListLocalesRequest) returns (ListLocalesResponse);
}

// CopyScreen is one SDK/hosted-page surface the catalog groups keys under.
// COPY_SCREEN_UNSPECIFIED selects every screen (used to request the whole
// editable surface at once).
enum CopyScreen {
  COPY_SCREEN_UNSPECIFIED = 0;
  COPY_SCREEN_SIGN_IN = 1;
  COPY_SCREEN_SIGN_UP = 2;
  COPY_SCREEN_PASSWORD_RESET = 3;
  COPY_SCREEN_VERIFY_EMAIL = 4;
  COPY_SCREEN_PAYWALL = 5;
}

// CopyKey is one catalog entry as the editor needs it: the key, its bundled
// default for the requested locale, its override value (empty when the project
// has none), and the validation contract (required placeholders + length cap)
// the editor should enforce client-side before saving.
message CopyKey {
  // Stable dotted catalog key, e.g. "sign_in.title".
  string key = 1;
  CopyScreen screen = 2;
  // The bundled default string for the requested locale (the hint shown under
  // an empty override, and what a reset restores).
  string default_value = 3;
  // The project's current override for this (locale, key); empty when none —
  // the screen renders default_value.
  string override_value = 4;
  // Interpolation placeholders that must appear in any override of this key
  // (e.g. "app_name", "expiry"); a save missing one is rejected.
  repeated string placeholders = 5;
  // Maximum length an override of this key may have; 0 means no explicit cap.
  int32 max_length = 6;
}

// CopyRevision is one saved version of a project's copy overrides.
message CopyRevision {
  string revision_id = 1;
  google.protobuf.Timestamp create_time = 2;
  // The locales this revision carried overrides for (for a compact history
  // label); the full document is restored by RestoreCopyRevision.
  repeated string locales = 3;
}

// Locale describes one language the editor can select.
message Locale {
  // BCP-47 tag, e.g. "fr" or "pt-BR".
  string tag = 1;
  // Human-readable name for the selector, e.g. "French".
  string display_name = 2;
  // True when moth ships a bundled translation for this locale.
  bool bundled = 3;
  // True when the project has overrides for this locale.
  bool customized = 4;
  // True when this is the project's default locale.
  bool is_default = 5;
}

message GetProjectCopyRequest {
  string project_id = 1;
  // BCP-47 tag to edit (e.g. "fr"). Empty defaults to the project's default
  // locale.
  string locale = 2;
  // Restrict the returned keys to one screen; UNSPECIFIED returns every
  // screen's keys.
  CopyScreen screen = 3;
}

message GetProjectCopyResponse {
  // Every catalog key for the requested screen(s), with the bundled default
  // for the locale and the project's current override.
  repeated CopyKey keys = 1;
  // The locale these keys resolve for (the request's locale, or the project
  // default when the request left it empty).
  string locale = 2;
  // The project's current copy revision; empty when it renders the fully
  // bundled default.
  string revision_id = 3;
  // True when the project has no copy overrides at all.
  bool is_default = 4;
}

message UpdateProjectCopyRequest {
  string project_id = 1;
  // BCP-47 tag to write; required.
  string locale = 2;
  // Full replacement of this locale's overrides: key → override string. Keys
  // must exist in the catalog and each value is placeholder/length validated;
  // a key omitted here (or set empty) reverts to the bundled default. Clearing
  // every value reverts the whole locale to defaults.
  map<string, string> values = 3;
}

message UpdateProjectCopyResponse {
  // The id of the revision this save created; empty when the update left the
  // project with no overrides (reverted to the fully bundled default).
  string revision_id = 1;
}

message ListCopyRevisionsRequest {
  string project_id = 1;
  // Maximum revisions to return; 0 (or anything above what the server keeps)
  // returns all kept revisions.
  int32 limit = 2;
}

message ListCopyRevisionsResponse {
  // Newest first.
  repeated CopyRevision revisions = 1;
}

message RestoreCopyRevisionRequest {
  string project_id = 1;
  string revision_id = 2;
}

message RestoreCopyRevisionResponse {
  // The id of the new revision created by the restore; empty when the restored
  // document had no overrides.
  string revision_id = 1;
}

message ResetCopyRequest {
  string project_id = 1;
  // BCP-47 tag to reset; required.
  string locale = 2;
  // The single key to reset; empty resets the whole locale to bundled
  // defaults.
  string key = 3;
}

message ResetCopyResponse {
  // The id of the new revision the reset created; empty when the reset left
  // the project with no overrides (reverted to the fully bundled default).
  string revision_id = 1;
}

message ListLocalesRequest {
  string project_id = 1;
}

message ListLocalesResponse {
  // The union of moth's bundled locales and the project's customized locales,
  // with the project default flagged.
  repeated Locale locales = 1;
  // The project's default locale tag.
  string default_locale = 2;
}
