version: v2
# Dart stubs for the Flutter SDK (moth.auth.v1 + moth.billing.v1 +
# moth.push.v1) — run via
# `make proto-dart` and commit the output. Kept out of buf.gen.yaml on purpose:
# CI's proto job has no Dart toolchain. Needs protoc-gen-dart on PATH
# (`dart pub global activate protoc_plugin`).
clean: true
inputs:
  - directory: proto
    paths:
      - proto/moth/auth/v1
      - proto/moth/billing/v1
      - proto/moth/push/v1
      # projectconfig/v1 ships only CacheEnvelope to the SDK (the on-device config
      # cache wrapper); the Stored* messages are server-side but harmless.
      - proto/moth/projectconfig/v1
plugins:
  - local: protoc-gen-dart
    out: sdk/flutter/lib/src/gen
    opt: grpc
    # Also generate imported files (google/protobuf/timestamp.proto): the
    # Dart protobuf runtime does not ship well-known types.
    include_imports: true
    include_wkt: true
