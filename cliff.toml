# git-cliff configuration — regenerates CHANGELOG.md from conventional
# commits. Run `git cliff --output CHANGELOG.md` (or `--tag vX.Y.Z` when
# cutting a release). GoReleaser produces the GitHub release notes from its
# own `changelog:` block (.goreleaser.yaml); this file owns the committed,
# human-facing CHANGELOG.md. The two use the same conventional-commit
# vocabulary so they stay consistent.
[changelog]
header = """
# Changelog

All notable changes to moth are recorded here. The format follows
[Keep a Changelog](https://keepachangelog.com/) and
[Semantic Versioning](https://semver.org/). This file is generated from
conventional-commit history by `git cliff`.
\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug fixes" },
  { message = "^sec", group = "Security" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^doc", group = "Documentation" },
  { message = "^Milestone", group = "Milestones" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
