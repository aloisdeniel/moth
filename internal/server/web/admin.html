<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>moth admin</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 720px;
         margin: 3rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { font-size: 1.4rem; } h1 small { font-weight: normal; opacity: .6; font-size: .9rem; }
  form { display: grid; gap: .6rem; max-width: 22rem; margin: 1rem 0; }
  input { padding: .5rem .6rem; font: inherit; border: 1px solid #8886; border-radius: 6px; }
  button { padding: .5rem .9rem; font: inherit; border: 1px solid #8886; border-radius: 6px;
           cursor: pointer; background: #4453; }
  table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
  th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid #8884; font-size: .9rem; }
  code { font-size: .85em; background: #8882; padding: .1em .3em; border-radius: 4px; word-break: break-all; }
  .error { color: #c0392b; min-height: 1.2em; }
  .card { border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  .hidden { display: none; }
  header { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<header>
  <h1>🦋 moth <small>admin (placeholder console)</small></h1>
  <button id="logout" class="hidden">Log out</button>
</header>

<section id="setup" class="hidden">
  <h2>Create the first admin account</h2>
  <p>Paste the setup token printed to the server console.</p>
  <form id="setup-form">
    <input name="token" placeholder="setup token" required>
    <input name="email" type="email" placeholder="email" required>
    <input name="password" type="password" placeholder="password (min 8 chars)" minlength="8" required>
    <button>Create admin</button>
    <div class="error" id="setup-error"></div>
  </form>
</section>

<section id="login" class="hidden">
  <h2>Log in</h2>
  <form id="login-form">
    <input name="email" type="email" placeholder="email" required>
    <input name="password" type="password" placeholder="password" required>
    <button>Log in</button>
    <div class="error" id="login-error"></div>
  </form>
</section>

<section id="console" class="hidden">
  <p>Signed in as <strong id="whoami"></strong></p>
  <h2>Projects</h2>
  <form id="create-form">
    <input name="name" placeholder="new project name" required>
    <button>Create project</button>
    <div class="error" id="create-error"></div>
  </form>
  <div id="new-keys" class="card hidden"></div>
  <table id="projects"><thead>
    <tr><th>Name</th><th>Slug</th><th>Publishable key</th><th></th></tr>
  </thead><tbody></tbody></table>
</section>

<script>
async function rpc(procedure, msg) {
  const res = await fetch('/moth.admin.v1.' + procedure, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify(msg || {}),
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(body.message || res.statusText), { code: body.code });
  return body;
}
const show = (id, on) => document.getElementById(id).classList.toggle('hidden', !on);
const esc = (s) => s.replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function refreshProjects() {
  const { projects = [] } = await rpc('ProjectService/ListProjects');
  document.querySelector('#projects tbody').innerHTML = projects.map((p) => `
    <tr><td>${esc(p.name)}</td><td><code>${esc(p.slug)}</code></td>
    <td><code>${esc(p.publishableKey)}</code></td>
    <td><button data-del="${esc(p.id)}" data-name="${esc(p.name)}">Delete</button></td></tr>`).join('');
}

async function enterConsole(admin) {
  show('setup', false); show('login', false); show('console', true); show('logout', true);
  document.getElementById('whoami').textContent = admin.email;
  await refreshProjects();
}

async function init() {
  const { needsSetup } = await (await fetch('/admin/status')).json();
  if (needsSetup) {
    show('setup', true);
    const tok = new URLSearchParams(location.search).get('setup');
    if (tok) document.querySelector('#setup-form [name=token]').value = tok;
    return;
  }
  try {
    const { admin } = await rpc('SessionService/GetCurrentAdmin');
    await enterConsole(admin);
  } catch { show('login', true); }
}

document.getElementById('setup-form').onsubmit = async (e) => {
  e.preventDefault();
  const f = new FormData(e.target);
  const res = await fetch('/admin/setup', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.fromEntries(f)),
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) { document.getElementById('setup-error').textContent = body.error || 'setup failed'; return; }
  history.replaceState(null, '', '/admin');
  init();
};

document.getElementById('login-form').onsubmit = async (e) => {
  e.preventDefault();
  const f = new FormData(e.target);
  try {
    const { admin } = await rpc('SessionService/Login', Object.fromEntries(f));
    await enterConsole(admin);
  } catch (err) { document.getElementById('login-error').textContent = err.message; }
};

document.getElementById('create-form').onsubmit = async (e) => {
  e.preventDefault();
  const name = new FormData(e.target).get('name');
  try {
    const { project, secretKey } = await rpc('ProjectService/CreateProject', { name });
    e.target.reset();
    const el = document.getElementById('new-keys');
    el.innerHTML = `<strong>${esc(project.name)}</strong> created.<br>
      Publishable key: <code>${esc(project.publishableKey)}</code><br>
      Secret key: <code>${esc(secretKey)}</code><br>
      <em>Copy the secret key now — it is shown only once.</em><br>
      JWKS: <code>/p/${esc(project.slug)}/.well-known/jwks.json</code>`;
    show('new-keys', true);
    await refreshProjects();
  } catch (err) { document.getElementById('create-error').textContent = err.message; }
};

document.getElementById('projects').onclick = async (e) => {
  const id = e.target.dataset?.del;
  if (!id || !confirm(`Delete project "${e.target.dataset.name}"? This cannot be undone.`)) return;
  await rpc('ProjectService/DeleteProject', { id });
  show('new-keys', false);
  await refreshProjects();
};

document.getElementById('logout').onclick = async () => {
  await rpc('SessionService/Logout');
  location.reload();
};

init();
</script>
</body>
</html>
