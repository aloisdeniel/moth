name: ci

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      # The async event writer (channels, atomics, concurrent Close/Emit),
      # the server that drives it end-to-end, the shared persistent rate
      # limiter (one SQLite-backed limiter behind concurrent gRPC + HTTP
      # callers), and the billing store clients (the mutex-guarded Google
      # OAuth2 token cache hit concurrently by 20 goroutines in
      # TestGoogleTokenCaching) run under the race detector; without -race
      # their concurrency tests — including TestTakeRateLimitConcurrent — cannot
      # fail on a data race.
      - run: go test -race ./internal/events/... ./internal/server/... ./internal/store/... ./internal/ratelimit/... ./internal/billing/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.6

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/admin/package-lock.json
            sdk/react/package-lock.json
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - run: buf lint
      - name: buf breaking
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=origin/${{ github.base_ref }}"
      # protoc-gen-es comes from web/admin's dev dependencies.
      - run: npm ci
        working-directory: web/admin
      # The React SDK's protoc-gen-es comes from sdk/react's dev dependencies
      # (its stubs are generated by the separate buf.gen.react.yaml template).
      - run: npm ci
        working-directory: sdk/react
      - name: check committed codegen is current
        run: |
          buf generate
          buf generate --template buf.gen.react.yaml
          git add -N gen/ web/admin/src/gen/ sdk/react/src/gen/
          git diff --exit-code gen/ web/admin/src/gen/ sdk/react/src/gen/

  # The admin SPA: typecheck, rebuild, and fail when the committed embedded
  # build (internal/server/web/dist) is stale.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/admin/package-lock.json
      - run: npm ci
        working-directory: web/admin
      - run: npm run build
        working-directory: web/admin
      - name: check committed SPA build is current
        run: |
          git add -N internal/server/web/dist/
          git diff --exit-code internal/server/web/dist/
      # The website's in-browser demo is the same SPA built in demo mode
      # (make web-demo) and committed to website/public/demo.
      - run: npm run build:demo
        working-directory: web/admin
      - name: check committed demo build is current
        run: |
          git add -N website/public/demo/
          git diff --exit-code website/public/demo/

  # Browser smoke test against the real binary with the SPA embedded:
  # first-run setup → login → create project → see keys.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/admin/package-lock.json
      - run: npm ci
        working-directory: web/admin
      - run: make build
      - run: npx playwright install --with-deps chromium
        working-directory: web/admin
      - run: npx playwright test
        working-directory: web/admin

  # The Flutter SDK and its example app: format, analyze, test, package
  # validation, the real-pub-client and real-binary acceptance tests, and
  # fail when the committed Dart stubs (make proto-dart) are stale.
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.0
          cache: true
      - run: flutter pub get
        working-directory: sdk/flutter
      - run: dart format --output=none --set-exit-if-changed .
        working-directory: sdk/flutter
      - run: flutter analyze
        working-directory: sdk/flutter
      - run: flutter test
        working-directory: sdk/flutter
      # Validates the package the way pub.dev would (pubspec sanity,
      # archive size, file set); catches anything the pub client would
      # reject before it ships embedded in the binary.
      - name: package dry-run publish validation
        run: dart pub publish --dry-run
        working-directory: sdk/flutter
      # The milestone acceptance test: the real `flutter pub get` resolving
      # moth_auth from a running moth server (tarball reproducibility is
      # covered by TestPubArchiveReproducible in the plain go-test job).
      - name: flutter pub get against a real server
        run: go test ./internal/server -run TestFlutterPubGet -v
      # SDK end-to-end against a freshly built binary: signup → sign-in →
      # transparent 5s-TTL refresh → restore → sign-out.
      - name: SDK e2e against the real binary
        run: make sdk-e2e
      - run: flutter pub get
        working-directory: sdk/flutter/example
      - run: flutter analyze
        working-directory: sdk/flutter/example
      - run: flutter test
        working-directory: sdk/flutter/example
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      # Pinned to the version the committed stubs were generated with.
      - run: dart pub global activate protoc_plugin 25.0.0
      - name: check committed Dart codegen is current
        run: |
          make proto-dart
          git add -N sdk/flutter/lib/src/gen
          git diff --exit-code sdk/flutter/lib/src/gen

  # The React SDK: typecheck, unit tests, package validation, the
  # real-npm-client acceptance tests, and fail when the committed library
  # build (sdk/react/dist, embedded in the binary via sdk/embed.go exactly
  # like internal/server/web/dist) is stale. The TypeScript stub staleness
  # check lives in the proto job alongside the other codegen diffs.
  react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sdk/react/package-lock.json
      - run: npm ci
        working-directory: sdk/react
      - run: npm run typecheck
        working-directory: sdk/react
      - run: npm test
        working-directory: sdk/react
      # Validates the package the way npm would (manifest sanity, published
      # file set); the npm analogue of `dart pub publish --dry-run`.
      - name: package dry-run pack validation
        run: npm pack --dry-run
        working-directory: sdk/react
      - run: npm run build
        working-directory: sdk/react
      - name: check committed library build is current
        run: |
          git add -N sdk/react/dist
          git diff --exit-code sdk/react/dist
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The milestone acceptance tests: a real `npm install` resolving
      # @moth/react from a running moth server, and byte-identical tarballs
      # across rebuilds (the npm analogues of TestFlutterPubGet and
      # TestPubArchiveReproducible).
      - name: npm install against a real server
        run: go test ./internal/server -run 'TestNpmInstall|TestNpmArchiveReproducible' -v
      # The browser integration test against the real binary (mirroring the
      # e2e job's Playwright steps): signup → transparent refresh →
      # sign-out, plus the billing loop against the local Stripe double —
      # paywall → test checkout → webhook → unlock — and the
      # no-Stripe-config project whose gates never block.
      - run: npm ci
        working-directory: sdk/react/example
      - run: make build
      - run: npx playwright install --with-deps chromium
        working-directory: sdk/react
      - run: npx playwright test
        working-directory: sdk/react

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/moth
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"

  # Known-vulnerability scan against the Go vuln database. govulncheck is
  # call-graph aware, so it only fails on advisories that reach code moth
  # actually executes.
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Pinned to an explicit version so the security gate is deterministic and
      # auditable: a floating @latest lets a newly published advisory turn CI
      # red on an untouched commit, and a scanner regression silently weaken it.
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  # Static security analysis. Fails only on high-severity, high-confidence
  # findings so the gate is actionable; the generated code under gen/ is
  # excluded. -no-fail keeps gosec from exiting non-zero on lower findings.
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run gosec
        # Pinned to an explicit release (not @master) so a new gosec rule cannot
        # turn CI red on an untouched commit and a regression cannot silently
        # weaken the gate.
        uses: securego/gosec@v2.22.5
        with:
          args: -severity high -confidence high -exclude-dir=gen -exclude-dir=web ./...
